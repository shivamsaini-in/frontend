# netlify.toml
[build]
  base = ""            # optional: set if your site is in a subfolder, e.g. "frontend"
  publish = "dist"     # change to your build output folder, e.g. "build" or "dist"
  command = "npm run build"  # change to your actual build command

# optional example redirects
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
